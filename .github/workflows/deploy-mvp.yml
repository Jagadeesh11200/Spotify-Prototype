name: Deploy Spotify Mood MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-browser-prototype:
    name: Validate and deploy browser prototype
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate evaluator portal
        run: |
          set -euo pipefail

          test -f deploy/evaluator-portal/index.html
          test -f deploy/evaluator-portal/prototype.html
          test -f deploy/evaluator-portal/prototype.css
          test -f deploy/evaluator-portal/prototype.js
          test -f deploy/evaluator-portal/evaluator-guide.html
          test -f deploy/evaluator-portal/system-design.html

          node --check deploy/evaluator-portal/prototype.js

      - name: Generate evaluator portal config
        run: |
          node <<'NODE'
          const fs = require("fs");
          const repositoryUrl = "https://github.com/Jagadeesh11200/Spotify-Prototype/";

          const config = {
            sessionProvider: "browser-web-replica",
            browserSessionUrl: "./prototype.html",
            mobileSessionUrl: "./prototype.html",
            repositoryUrl,
            buildSha: process.env.GITHUB_SHA,
            generatedAt: new Date().toISOString()
          };

          fs.writeFileSync(
            "deploy/evaluator-portal/app-config.js",
            `window.SPOTIFY_MOOD_MVP_CONFIG = ${JSON.stringify(config, null, 2)};\n`
          );
          NODE

      - name: Deploy evaluator portal to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::error::Missing VERCEL_TOKEN GitHub secret."
            exit 1
          fi

          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "::error::Missing VERCEL_ORG_ID GitHub secret."
            exit 1
          fi

          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error::Missing VERCEL_PROJECT_ID GitHub secret."
            exit 1
          fi

          npm install --global vercel@latest
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "${VERCEL_ORG_ID}" "${VERCEL_PROJECT_ID}" > .vercel/project.json
          vercel deploy --prod --yes --token "${VERCEL_TOKEN}"
